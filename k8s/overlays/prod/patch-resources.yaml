# Prod resource patches — raise backend service requests/limits.
# Strategic-merge patches against the base Deployments. Frontend unchanged.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoint
  namespace: sovdefence
spec:
  template:
    spec:
      containers:
        - name: geoint
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
