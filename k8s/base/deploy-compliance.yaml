# Compliance service — NIS2/DORA/GDPR/VS-NfD automation (port 8005).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: compliance
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "6-compliance"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: compliance
  template:
    metadata:
      labels:
        app.kubernetes.io/name: compliance
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: compliance
          image: sovdefence/compliance:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8005
              protocol: TCP
          env:
            # Live OCI checks (Cloud Guard, ADB encryption, bucket public
            # access, OLS status) probe IMDS first; OKE Virtual Nodes don't
            # expose IMDS, so without proper Workload-Identity wiring those
            # endpoints would surface as yellow `instance_principal_unavailable`
            # banners in the Compliance view. The synthetic-data path
            # (services/compliance/app/routers/live_checks.py:_demo_mode)
            # returns curated Cloud Guard problems + green-passing tiles
            # instead. Flip to "false" once the OKE Workload-Identity
            # signer is wired in code (analogous to PR #37 for uc4-chat)
            # and an IAM policy grants `cloud-guard-family` + read on
            # `autonomous-database-family` to sovdefence-runtime.
            - name: COMPLIANCE_DEMO_MODE
              value: "true"
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            - secretRef:
                name: adb-credentials
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
