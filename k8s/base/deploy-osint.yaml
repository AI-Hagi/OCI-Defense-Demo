# OSINT & Threat Fusion service — Graph Analytics over open sources (port 8003).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: osint
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "4-osint-fusion"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: osint
  template:
    metadata:
      labels:
        app.kubernetes.io/name: osint
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: osint
          image: sovdefence/osint:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - secretRef:
                name: adb-credentials
            # UC4 ORDS OAuth2 credentials — populated by ESO from OCI Vault
            # (see k8s/base/external-secrets/externalsecret-uc4-oauth.yaml).
            # The uc4_proxy router prefers env-var creds over the Vault SDK
            # path, so this avoids needing the OCI Python SDK to do its own
            # Resource-Principal lookup at request time.
            - secretRef:
                name: uc4-oauth-creds
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
