# PLACEHOLDER ONLY — wallet contents MUST NOT be committed.
# ---------------------------------------------------------------------------
# Create the wallet Secret from the locally downloaded ATP wallet ZIP
# (unzipped to ~/wallet on the jump host):
#
#   kubectl -n sovdefence create secret generic adb-wallet \
#     --from-file=$HOME/wallet/
#
# The files placed into the Secret should include (typical Oracle wallet):
#   cwallet.sso  ewallet.p12  keystore.jks  ojdbc.properties
#   sqlnet.ora   tnsnames.ora truststore.jks
#
# Mounted into every service Pod at /app/wallet (readOnly).
# Rotate whenever the ATP wallet is regenerated via:
#   oci db autonomous-database generate-wallet --autonomous-database-id <OCID> \
#     --file /tmp/wallet.zip --password '<wallet-password>'
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: adb-wallet
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: db-wallet
  annotations:
    sovdefence.oci/source: "oci db autonomous-database generate-wallet"
type: Opaque
# Empty data block — real wallet files are injected via the kubectl command above.
data: {}
