# SecretStore — OCI Vault backend for External Secrets Operator (ESO).
# ---------------------------------------------------------------------------
# Authenticates to OCI Vault via OKE Workload Identity using the existing
# `sovdefence-runtime` ServiceAccount (it carries the
# `oci.oraclecloud.com/workload-identity: "true"` annotation). The OKE
# control plane mints an OIDC token for the SA and OCI IAM verifies it
# against the policy that grants `read secret-bundles` to the workload
# principal — so no OCI API key, no client_secret, no instance principal
# ever lives inside the cluster.
#
# This SecretStore is namespaced (sovdefence) intentionally: it should not
# be reachable from other namespaces. Apply order: install ESO via Helm,
# create the IAM policy below, then `kubectl apply -k k8s/overlays/prod`.
#
# Required IAM (per use case — narrow grants only, repeated per resource):
#   Allow any-user to read secret-bundles in compartment oci-defence-demo
#     where all {
#       request.principal.type='workload',
#       request.principal.cluster_id='<OKE-cluster-OCID>',
#       request.principal.namespace='sovdefence',
#       request.principal.service_account='sovdefence-runtime',
#       any { target.secret.id='<secret-OCID-1>',
#             target.secret.id='<secret-OCID-2>', ... }
#     }
#
# To install ESO once:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#       -n external-secrets --create-namespace
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: oci-vault-store
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: secret-store
spec:
  provider:
    oracle:
      # eu-frankfurt-1 — keep aligned with the rest of the deployment.
      region: eu-frankfurt-1
      # OCID of `defence-demo-vault` in compartment oci-defence-demo. Not a
      # secret — Vault OCIDs are public references; the secret VALUES live
      # behind IAM. Override per-environment via overlay patch if needed.
      vault: "ocid1.vault.oc1.eu-frankfurt-1.enu7bzy7aafpc.abtheljrzsrl5gkmyqvngokbn53dqdib7zh4lppnoid7qd3527kd2pjrvclq"
      principalType: Workload
      serviceAccountRef:
        name: sovdefence-runtime
