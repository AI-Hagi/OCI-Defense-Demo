# SecretStore — OCI Vault backend for External Secrets Operator (ESO).
# ---------------------------------------------------------------------------
# Authenticates to OCI via the existing Workload Identity SA
# (`sovdefence-runtime`). No API keys live in-cluster; the SA token is
# minted by the OKE control plane and trusted by the IAM policy that
# already grants it `read` on the platform compartment vault.
#
# To install ESO once:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#       -n external-secrets --create-namespace
#
# Required IAM (outside cluster):
#   Allow any-user to read secret-family in compartment oci-defence-demo
#     where all {
#       request.principal.type='workload',
#       request.principal.namespace='sovdefence',
#       request.principal.service_account='sovdefence-runtime'
#     }
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: oci-vault-store
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: secret-store
spec:
  provider:
    oracle:
      # eu-frankfurt-1 — keep aligned with the rest of the deployment.
      region: eu-frankfurt-1
      # Vault OCID is provisioned by Crossplane (crossplane/vault/composition.yaml).
      # Override per-environment via overlay patch when the OCID rotates.
      vault: "ocid1.vault.oc1.eu-frankfurt-1.<TENANCY-VAULT-OCID>"
      auth:
        # Workload Identity — uses the projected SA token.
        serviceAccountRef:
          name: sovdefence-runtime
