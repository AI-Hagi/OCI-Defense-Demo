# ExternalSecret — projects the OCIR auth token from OCI Vault into
# the existing `ocir-secret` Kubernetes Secret of type
# `kubernetes.io/dockerconfigjson`. The serviceaccount-workload-identity
# manifest's `imagePullSecrets: ocir-secret` keeps working unchanged.
#
# Vault entry expected:
#   ocir-auth-token   (raw token; the username is non-secret config)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ocir-secret
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: image-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: ocir-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # The dockerconfigjson is rendered from a token + a fixed username.
        # The username is the OCIR namespace + IAM email; it is not secret
        # but is environment-specific, so it lives in the overlay's
        # configMapGenerator (`OCIR_AUTH_USER`) and is templated here.
        .dockerconfigjson: |
          {"auths": {"fra.ocir.io": {
            "username": "{{ .ocirUser }}",
            "password": "{{ .ocirToken }}",
            "auth": "{{ printf "%s:%s" .ocirUser .ocirToken | b64enc }}"
          }}}
  data:
    - secretKey: ocirToken
      remoteRef:
        key: ocir-auth-token
    - secretKey: ocirUser
      remoteRef:
        # Stored in Vault so a username rotation (e.g. service-account swap)
        # doesn't require an overlay edit.
        key: ocir-username
