# ExternalSecret — projects the UC4 ORDS OAuth2 client credentials from
# OCI Vault into a Kubernetes Secret consumed by the osint-fusion service's
# uc4_proxy router (services/osint-fusion/app/routers/uc4_proxy.py).
#
# The proxy reads UC4_OAUTH_CLIENT_ID + UC4_OAUTH_CLIENT_SECRET from env;
# this manifest keeps those values out of git and out of the container
# image — they live only in OCI Vault, ESO mirrors them every 5 minutes.
#
# Vault entries (created by db/schema/uc4_osint/06_ords_oauth.sql + manual
# stash, see compartment oci-defence-demo / vault defence-demo-vault):
#   oauth-client-uc4-agent-id
#   oauth-client-uc4-agent-secret
#
# Refresh: 5 minutes. Short enough to pick up rotations within a demo
# session, low enough to stay below OCI Vault read limits.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: uc4-oauth-creds
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: uc4-oauth
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    # Same Secret name the osint Deployment references via envFrom.
    name: uc4-oauth-creds
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        UC4_OAUTH_CLIENT_ID:     "{{ .clientId }}"
        UC4_OAUTH_CLIENT_SECRET: "{{ .clientSecret }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: oauth-client-uc4-agent-id
    - secretKey: clientSecret
      remoteRef:
        key: oauth-client-uc4-agent-secret
