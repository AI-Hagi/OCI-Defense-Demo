# ExternalSecret — projects sovdef26 ADB credentials from OCI Vault into
# the existing `adb-credentials` Kubernetes Secret. Workload pods that
# already use `envFrom: secretRef: name: adb-credentials` need *zero*
# changes — ESO refreshes the same Secret name in place.
#
# Vault entries expected (created via Crossplane or manually one-shot):
#   adb-admin-password
#   adb-wallet-password
#
# Refresh interval is 5 minutes — short enough that a manual rotation
# in OCI Vault propagates within the same demo session, low enough to
# stay below the OCI Vault read rate limit.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: adb-credentials
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: db-credentials
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    # Same name the existing Deployments reference via envFrom secretRef.
    name: adb-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        # ORACLE_USER is non-secret; pin here so the env shape stays stable.
        ORACLE_USER: "ADMIN"
        ORACLE_PASSWORD: "{{ .adminPassword }}"
        WALLET_PASSWORD: "{{ .walletPassword }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: adb-admin-password
    - secretKey: walletPassword
      remoteRef:
        key: adb-wallet-password
