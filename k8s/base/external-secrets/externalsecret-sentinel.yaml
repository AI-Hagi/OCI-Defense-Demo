# ExternalSecret — projects the three Copernicus Dataspace secrets from
# OCI Vault into a single `sentinel-credentials-secret` Kubernetes Secret
# with three data keys: SENTINEL_CLIENT_ID, SENTINEL_CLIENT_SECRET,
# SENTINEL_INSTANCE_ID. The sentinel-proxy Deployment reads them via
# `envFrom: secretRef`, so pydantic-settings sees them as plain env vars.
#
# Vault entries expected (compartment oci-defence-demo):
#   sentinel-client-id        OAuth2 client ID (CDSE)
#   sentinel-client-secret    OAuth2 client secret (CDSE)
#   sentinel-instance-id      Sentinel Hub Configuration UUID
#
# Refresh interval is 1 h — short enough to pick up rotations within a
# demo session, low enough to stay below OCI Vault read quotas.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: sentinel-credentials-secret
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: sentinel-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: sentinel-credentials-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        SENTINEL_CLIENT_ID: "{{ .clientId }}"
        SENTINEL_CLIENT_SECRET: "{{ .clientSecret }}"
        SENTINEL_INSTANCE_ID: "{{ .instanceId }}"
  data:
    - secretKey: clientId
      remoteRef:
        key: sentinel-client-id
    - secretKey: clientSecret
      remoteRef:
        key: sentinel-client-secret
    - secretKey: instanceId
      remoteRef:
        key: sentinel-instance-id
