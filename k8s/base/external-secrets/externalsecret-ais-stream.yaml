# ExternalSecret — projects the AIS Stream API key from OCI Vault into
# a `ais-stream-key-secret` Kubernetes Secret with a single key:
# `AIS_STREAM_API_KEY`. The ais-multiplexer Deployment mounts this Secret
# via `envFrom: secretRef`, so the variable is read by pydantic-settings
# at startup and preferred over OCID-based Vault resolution (see
# services/ais-multiplexer/app/vault.py).
#
# Vault entry expected (compartment oci-defence-demo):
#   ais-stream-key   (raw token from https://aisstream.io/apikeys)
#
# Refresh interval is 1 h — short enough to pick up rotations within a
# demo session, low enough to stay below OCI Vault read quotas.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ais-stream-key-secret
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: ais-stream-key
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault-store
    kind: SecretStore
  target:
    name: ais-stream-key-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        AIS_STREAM_API_KEY: "{{ .aisKey }}"
  data:
    - secretKey: aisKey
      remoteRef:
        key: ais-stream-key
