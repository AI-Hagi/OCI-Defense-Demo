# Document Intelligence service — RAG over classified docs (port 8002).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-intel
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: doc-intel
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "2-doc-intelligence"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: doc-intel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: doc-intel
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: doc-intel
          image: sovdefence/doc-intel:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            # PyTorch / sentence-transformers cache dirs — non-root container
            # user can't write to /.cache or PyTorch's default mega-cache,
            # which causes "PermissionError at /.cache" and "Artifact of type=
            # precompile already registered" on /upload requests.
            - name: TORCHINDUCTOR_CACHE_DIR
              value: /tmp/torchinductor_cache
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: SENTENCE_TRANSFORMERS_HOME
              value: /tmp/st_cache
            - name: XDG_CACHE_HOME
              value: /tmp/xdg_cache
          envFrom:
            - configMapRef:
                name: sovdefence-common
            # Tenancy-specific OCI runtime config (compartment OCID, region) —
            # required by app/llm.py for the OCI Generative AI Inference call
            # that powers the /api/documents/chat RAG synthesis.
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            - secretRef:
                name: adb-credentials
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
