# PLACEHOLDER ONLY — do NOT commit real credentials.
# ---------------------------------------------------------------------------
# Populate this Secret out-of-band before first deploy:
#
#   kubectl -n sovdefence create secret generic adb-credentials \
#     --from-literal=ORACLE_USER=admin \
#     --from-literal=ORACLE_PASSWORD='<strong-password>' \
#     --from-literal=WALLET_PASSWORD='<wallet-pkcs12-password>'
#
# The values below are intentionally empty so `kubectl apply` of this file
# creates the resource shell (which kustomize can reference) without leaking
# real secrets in git. Values are injected into Pods via envFrom: secretRef.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: adb-credentials
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: db-credentials
  annotations:
    sovdefence.oci/rotation-policy: "90d"
type: Opaque
stringData:
  ORACLE_USER: ""
  ORACLE_PASSWORD: ""
  WALLET_PASSWORD: ""
