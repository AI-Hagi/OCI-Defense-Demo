# GEOINT service — Satellite imagery + YOLOv8 + 26ai Vector Search.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoint
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: geoint
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "1-geoint"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: geoint
  template:
    metadata:
      labels:
        app.kubernetes.io/name: geoint
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: geoint
          image: sovdefence/geoint:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            # torch._dynamo.package.cache_dir() calls getpass.getuser() →
            # pwd.getpwuid(uid). The pod runs as uid 1000 with no
            # /etc/passwd entry, so the lookup raises KeyError on the
            # first model.predict() call. Setting this env var short-
            # circuits that path. Belt-and-braces with the Dockerfile
            # ENV (defence in depth — manifest wins on conflict).
            - name: TORCHINDUCTOR_CACHE_DIR
              value: /tmp/torchinductor_cache
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            - secretRef:
                name: adb-credentials
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
