# Flights Proxy — UC4 Sovereign Proxy Pattern A (port 8009).
# Polls adsb.lol every REFRESH_MINUTES; runs the hybrid classifier
# (curated → Mictronics → civil) and writes two cache rows per tick
# (layer='flights-civil' and layer='flights-mil') into 26ai osint_cache.
# Single replica: only one APScheduler should run the fetch tick;
# additional replicas would multiply upstream load + cache writes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flights-proxy
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: flights-proxy
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "4-osint-flights"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: flights-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flights-proxy
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: flights-proxy
          image: sovdefence/flights-proxy:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8009
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            # adb-credentials provides ORACLE_USER, ORACLE_PASSWORD,
            # WALLET_PASSWORD — used by db.py for audit_events,
            # osint_cache writes, and mil_aircraft_unified lookups.
            - secretRef:
                name: adb-credentials
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            # Pattern A poll + classifier in-process cache. Identical
            # footprint to jamming-poller — one APScheduler tick every
            # 2 min, ~200 aircraft per tick. Keep requests = limits for
            # Guaranteed QoS on Virtual Nodes.
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
