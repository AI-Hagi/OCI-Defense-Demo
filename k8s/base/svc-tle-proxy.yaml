# TLE Proxy — ClusterIP, reached via Ingress /api/osint/satellites.
apiVersion: v1
kind: Service
metadata:
  name: tle-proxy
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: tle-proxy
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tle-proxy
  ports:
    - name: http
      protocol: TCP
      port: 8010
      targetPort: http
