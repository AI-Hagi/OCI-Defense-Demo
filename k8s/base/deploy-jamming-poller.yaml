# GPS Jamming Poller — UC4 Sovereign Proxy Pattern A (port 8007).
# Daily fetch of gpsjam.org → H3-hex polygon GeoJSON → 26ai osint_cache.
# Single replica: only one APScheduler should run the fetch tick;
# additional replicas would multiply upstream load + cache writes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jamming-poller
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: jamming-poller
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "4-osint-jamming"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: jamming-poller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jamming-poller
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: jamming-poller
          image: sovdefence/jamming-poller:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8007
              protocol: TCP
          env:
            # Tuning for adsb.lol live-snapshot density — gpsjam.org's
            # original res-4 + min-3 tuning assumes a 24 h aggregated
            # window (millions of position reports). adsb.lol returns ~25
            # aircraft per snapshot in the 250 nm Baltic radius, so we
            # need coarser cells + a lower noise floor to get visible
            # demo output. The sliding-window accumulator (follow-up
            # commit) replaces this with statistically meaningful sample
            # sizes and these env overrides can revert to defaults.
            - name: H3_RESOLUTION
              value: "3"
            - name: MINIMUM_AIRCRAFT_COUNT
              value: "2"
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            # adb-credentials provides ORACLE_USER, ORACLE_PASSWORD,
            # WALLET_PASSWORD — used by db.py for the audit_events
            # writer + osint_cache writer.
            - secretRef:
                name: adb-credentials
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            # No WebSocket long-connection — lighter than ais-multiplexer
            # (which is 500m/1Gi). One Pattern-A fetch tick every 6 h is
            # cheap. Keep requests = limits to stay in the Guaranteed QoS
            # class on Virtual Nodes.
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
