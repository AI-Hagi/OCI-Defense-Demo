# Supply Chain service — ClusterIP (reached via Ingress /api/sc).
apiVersion: v1
kind: Service
metadata:
  name: supply-chain
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: supply-chain
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: supply-chain
  ports:
    - name: http
      protocol: TCP
      port: 8004
      targetPort: http
