# OSINT service — ClusterIP (reached via Ingress /api/osint).
apiVersion: v1
kind: Service
metadata:
  name: osint
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: osint
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: osint
  ports:
    - name: http
      protocol: TCP
      port: 8003
      targetPort: http
