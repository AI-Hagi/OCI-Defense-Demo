# Sentinel-2 Proxy — UC4 Sovereign Proxy Pattern C (port 8008).
# Translates browser XYZ tile requests to Sentinel Hub WMS GetMap calls
# with a cached OAuth2 Bearer token from Copernicus Dataspace.
# Single replica: token is in-process state; additional replicas would
# multiply OAuth refresh load + audit batches.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-proxy
  namespace: sovdefence
  labels:
    app.kubernetes.io/name: sentinel-proxy
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: sovdefence-platform
    sovdefence.oci/use-case: "4-osint-sentinel"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-proxy
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: sovdefence-platform
    spec:
      serviceAccountName: sovdefence-runtime
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: sentinel-proxy
          image: sovdefence/sentinel-proxy:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8008
              protocol: TCP
          envFrom:
            - configMapRef:
                name: sovdefence-common
            - configMapRef:
                name: sovdefence-oci-runtime
                optional: true
            # adb-credentials provides ORACLE_USER/PASSWORD/WALLET_PASSWORD
            # for the audit_events writer.
            - secretRef:
                name: adb-credentials
            # sentinel-credentials-secret is projected from OCI Vault by ESO
            # (see external-secrets/externalsecret-sentinel.yaml). Three
            # data keys: SENTINEL_CLIENT_ID, SENTINEL_CLIENT_SECRET,
            # SENTINEL_INSTANCE_ID. Pydantic-settings reads them via env.
            - secretRef:
                name: sentinel-credentials-secret
          volumeMounts:
            - name: adb-wallet
              mountPath: /app/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: adb-wallet
          secret:
            secretName: adb-wallet
