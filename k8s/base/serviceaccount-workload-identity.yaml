# OKE Workload Identity ServiceAccount
# ---------------------------------------------------------------------------
# Pods that mount this SA obtain an OCI instance_principal-equivalent token
# issued by the OKE control plane. No API keys / private keys are required
# in-cluster; oracledb driver authenticates to Autonomous Database through
# the mounted wallet files + DB username/password from the Secret.
#
# Required IAM policy (create ONCE in the tenancy — outside the cluster):
#
#   Allow any-user to manage autonomous-database-family in compartment oci-defence-demo
#     where all {
#       request.principal.type='workload',
#       request.principal.namespace='sovdefence',
#       request.principal.service_account='sovdefence-runtime'
#     }
#
# Verify after apply:
#   kubectl -n sovdefence describe sa sovdefence-runtime
#   kubectl -n sovdefence run who --rm -it --image=ghcr.io/oracle/oci-cli:latest \
#       --serviceaccount=sovdefence-runtime -- oci iam availability-domain list
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sovdefence-runtime
  namespace: sovdefence
  labels:
    app.kubernetes.io/part-of: sovdefence-platform
    app.kubernetes.io/component: workload-identity
  annotations:
    # Opt this SA into OKE Workload Identity.
    oci.oraclecloud.com/workload-identity: "true"
    # Target compartment for resources this SA can reach.
    oci.oraclecloud.com/compartment-id: "ocid1.compartment.oc1..aaaaaaaamcjaobwgnwwwkaphfzuzavq2dez6jkonahdwsn6ys7apqgiqelmq"
automountServiceAccountToken: true
