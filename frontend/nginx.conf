server {
    listen       8080;
    server_name  _;

    # SPA entrypoint
    root   /usr/share/nginx/html;
    index  index.html;

    # GEOINT (UC1) ingests satellite + UAV scene imagery via
    # POST /api/geoint/scenes/upload. Real Sentinel-2 / RADARSAT scenes
    # easily exceed nginx's default 1 MB body cap; raise to 100 MB so
    # operators can upload 4-10 megapixel TIFF/PNG strips without 413.
    # Backend (FastAPI/Starlette) has no own size limit — the handler
    # reads UploadFile.read() directly and persists to OCI Object Storage.
    client_max_body_size 100m;

    # Cluster DNS resolver — required for nginx to re-resolve Service names
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    # Static assets (hashed filenames — long cache)
    location ~* \.(?:js|css|woff2?|eot|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend API reverse proxies (Kubernetes in-cluster DNS)
    location /api/geoint/ {
        proxy_pass http://geoint.sovdefence.svc.cluster.local:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /api/documents/ {
        proxy_pass http://doc-intel.sovdefence.svc.cluster.local:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /api/osint/ {
        proxy_pass http://osint.sovdefence.svc.cluster.local:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    # /api/uc4/ — UC4 ORDS reverse-proxy (also served by the osint-fusion
    # service on port 8003). Browser cannot hold the OAuth client_secret,
    # so this hop adds the bearer + forwards X-OLS-Label-Max to ORDS.
    location /api/uc4/ {
        proxy_pass http://osint.sovdefence.svc.cluster.local:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /api/sc/ {
        proxy_pass http://supply-chain.sovdefence.svc.cluster.local:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /api/compliance/ {
        proxy_pass http://compliance.sovdefence.svc.cluster.local:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # UC4 GPS Jamming — Sovereign Proxy Pattern A (REST poll + H3 transform).
    # gpsjam.org daily CSV is fetched server-side, persisted in osint_cache,
    # and served as GeoJSON via /api/osint/jamming/current. Trailing slash
    # required so /api/osint/jamming/current resolves at the upstream.
    location /api/osint/jamming/ {
        proxy_pass http://jamming-poller.sovdefence.svc.cluster.local:8007;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # UC4 Flights — Sovereign Proxy Pattern A (REST poll + hybrid classifier).
    # adsb.lol is polled server-side; aircraft are classified curated→Mictronics
    # →civil and persisted as two osint_cache rows (flights-civil / flights-mil).
    # Browser fetches /api/osint/flights/{civil|mil}/current as GeoJSON.
    # `^~` modifier ensures nginx doesn't fall through to the static-asset regex.
    location ^~ /api/osint/flights/ {
        proxy_pass http://flights-proxy.sovdefence.svc.cluster.local:8009;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # UC4 Satellites — Sovereign Proxy Pattern A (REST poll for TLE).
    # CelesTrak is polled every 6 h; three osint_cache rows are kept
    # (satellites-stations / satellites-resource / satellites-active).
    # Browser fetches /api/osint/satellites/{group}/current as a TLE
    # JSON blob and runs SGP4 propagation client-side via satellite.js.
    location ^~ /api/osint/satellites/ {
        proxy_pass http://tle-proxy.sovdefence.svc.cluster.local:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # TLE blobs can be ~50 KB compressed for the active catalog —
        # well within the default 30 s read timeout.
        proxy_read_timeout 30s;
    }

    # UC4 Ports — Sovereign Proxy Pattern A (static load + hybrid OSM
    # + curated classifier). Browser fetches /api/osint/ports/current
    # once on enable; ports are static so no refresh loop. Manage
    # endpoint /api/osint/ports/refresh is gated by X-Internal-Token
    # at the application layer; nginx just proxies.
    location ^~ /api/osint/ports/ {
        proxy_pass http://ports-proxy.sovdefence.svc.cluster.local:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Internal-Token $http_x_internal_token;
        # Bootstrap loader runs once and can take 30+ s on a first cold
        # start (Overpass for the entire Europe-Mediterranean bbox).
        # Read endpoint /current itself is millisecond-scale.
        proxy_read_timeout 60s;
    }

    # UC4 Sentinel-2 Imagery — Sovereign Proxy Pattern C (WMS reverse-proxy
    # with OAuth2 token cache). The browser fetches XYZ tiles
    # /api/osint/sentinel/tiles/{layer}/{z}/{x}/{y}.png; the upstream
    # converts to a Sentinel Hub WMS GetMap call signed with a Bearer
    # token. Cache headers are passed through so browsers can cache PNGs.
    #
    # `^~` modifier: nginx must NOT fall through to the static-asset
    # regex (`\.png$` etc.) for paths under /api/osint/sentinel/, even
    # though tile URLs end in .png. Without this the static handler
    # would `try_files` against the SPA htdocs and 404 every tile.
    location ^~ /api/osint/sentinel/ {
        proxy_pass http://sentinel-proxy.sovdefence.svc.cluster.local:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tile fetches can take ~5-10 s during cold-cache periods at the
        # Sentinel Hub side; raise the read timeout above the default 60 s
        # so retries don't compete with in-flight upstream calls.
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # UC4 Maritime — WebSocket multiplexer (Sovereign Proxy Pattern B).
    # Long-lived ws:// connection, fanned out from one upstream aisstream.io
    # subscription. Path is consumed verbatim by ais-multiplexer's /ws/maritime
    # endpoint, no rewrite needed.
    location /ws/maritime {
        proxy_pass http://ais-multiplexer.sovdefence.svc.cluster.local:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-lived AIS feed — disable nginx default 60s read timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # UC4 Chat — LLM tool-calling orchestrator. One short chat-turn per
    # connection (server closes after the answer), so the read-timeout
    # bound is short. The OCI Native Ingress port-80 listener has only
    # the catch-all `/` rule, so this nginx hop is the actual reverse-
    # proxy for /ws/uc4-chat → uc4-chat:8013.
    location /ws/uc4-chat {
        proxy_pass http://uc4-chat.sovdefence.svc.cluster.local:8013;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # One chat turn ~= one OCI GenAI call + tool round-trips. 120s
        # is enough headroom for a 5-hop loop with cold-start tools.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # SPA fallback — React Router client-side paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health for k8s probes
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
