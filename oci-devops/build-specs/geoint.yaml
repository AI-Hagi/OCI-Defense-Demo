version: 0.1
component: build
timeoutInSeconds: 3600
shell: bash

env:
  variables:
    IMAGE_NAME: "sovdefence/geoint"
    SERVICE_DIR: "services/geoint"
    DOCKER_BUILDKIT: "1"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  exportedVariables:
    - IMAGE_TAG
    - IMAGE_SHA256
    - COMMIT_HASH

steps:
  - type: Command
    name: "Show build context"
    timeoutInSeconds: 60
    command: |
      set -euo pipefail
      # OCI_TRIGGER_COMMIT_HASH is populated for some trigger sources but not
      # all (notably absent on GITHUB-trigger runs). Fall back to OCI's
      # secondary env var, then to git rev-parse on the checked-out workspace,
      # then finally to a UTC timestamp so manual runs still produce an
      # IMAGE_TAG.
      COMMIT_HASH="${OCI_TRIGGER_COMMIT_HASH:-${OCI_PRIMARY_SOURCE_COMMIT_HASH:-$(git -C "$OCI_PRIMARY_SOURCE_DIR" rev-parse HEAD 2>/dev/null || echo "")}}"
      if [ -z "$COMMIT_HASH" ]; then COMMIT_HASH="$(date -u +%Y%m%d%H%M%S)"; fi
      echo "Repo hash:      $COMMIT_HASH"
      echo "Build run ID:   $OCI_BUILD_RUN_ID"
      echo "Service dir:    $SERVICE_DIR"
      IMAGE_TAG="${COMMIT_HASH:0:12}"
      echo "COMMIT_HASH=$COMMIT_HASH" >> "$OCI_WORKSPACE_DIR/env.export"
      echo "IMAGE_TAG=$IMAGE_TAG" >> "$OCI_WORKSPACE_DIR/env.export"
      echo "Resolved IMAGE_TAG=$IMAGE_TAG"

  - type: Command
    name: "Lint (pyflakes)"
    timeoutInSeconds: 300
    command: |
      set -euo pipefail
      cd "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR"
      python3 -m pip install --quiet pyflakes
      python3 -m pyflakes app/ || true

  - type: Command
    name: "Unit tests (pytest)"
    timeoutInSeconds: 1200
    onFailure:
      - type: Command
        name: "Preserve test reports"
        command: |
          set -eu
          mkdir -p "$OCI_WORKSPACE_DIR/test-reports/geoint"
          if [ -f "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR/junit.xml" ]; then
            cp "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR/junit.xml" \
               "$OCI_WORKSPACE_DIR/test-reports/geoint/" || true
          fi
          if [ -d "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR/.pytest_cache" ]; then
            cp -r "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR/.pytest_cache" \
                  "$OCI_WORKSPACE_DIR/test-reports/geoint/pytest_cache" || true
          fi
          echo "Test reports (if any) staged under test-reports/geoint/"
    command: |
      set -euo pipefail
      cd "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR"
      pip install -r requirements-dev.txt
      if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      python3 -m pytest tests/ --junitxml=junit.xml

  - type: Command
    name: "Docker build"
    timeoutInSeconds: 1800
    command: |
      set -euo pipefail
      cd "$OCI_PRIMARY_SOURCE_DIR/$SERVICE_DIR"
      docker build \
        --no-cache --ulimit nofile=65536:65536 \
        -t "$IMAGE_NAME:$IMAGE_TAG" \
        -t "$IMAGE_NAME:latest" \
        .

  - type: Command
    name: "Image SHA256 + traceability"
    timeoutInSeconds: 60
    command: |
      set -euo pipefail
      IMAGE_SHA256="$(docker inspect --format='{{.Id}}' "$IMAGE_NAME:$IMAGE_TAG")"
      echo "IMAGE_SHA256=$IMAGE_SHA256" >> "$OCI_WORKSPACE_DIR/env.export"
      echo "::build-trace:: image=$IMAGE_NAME:$IMAGE_TAG sha256=$IMAGE_SHA256 commit=$COMMIT_HASH run=$OCI_BUILD_RUN_ID"

outputArtifacts:
  - name: container-image
    type: DOCKER_IMAGE
    location: "localhost/$IMAGE_NAME:$IMAGE_TAG"
