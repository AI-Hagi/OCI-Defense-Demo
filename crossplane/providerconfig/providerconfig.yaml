# OCI ProviderConfig — InstancePrincipal auth via a Secret.
# The Secret contains a minimal JSON telling the Terraform OCI plugin
# to use the pod's Instance Principal (IMDS). Requires provider Pods
# on the managed node (see runtimeconfig.yaml).
apiVersion: oci.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: oci-creds
      key: credentials
